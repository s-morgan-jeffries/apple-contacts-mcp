name: Create Release

on:
  push:
    tags:
      - 'v*'
      - '!v*-rc*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract section between ## [VERSION] and next ## [
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release $VERSION"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        # `--notes` content is passed through an env var so the shell never
        # sees the CHANGELOG body inlined. Inlining via `${{ ... }}` lets
        # any backticks, $(...), or bare words in the release notes execute
        # as shell — caught in v0.3.0's release when the niche-field
        # examples broke the workflow.
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Release $GITHUB_REF_NAME" \
            --notes "$RELEASE_NOTES"
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}

      - name: Close milestone
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MILESTONE=$(gh api repos/${{ github.repository }}/milestones --jq ".[] | select(.title == \"v$VERSION\" or .title == \"$VERSION\") | .number" 2>/dev/null || echo "")
          if [ -n "$MILESTONE" ]; then
            gh api -X PATCH repos/${{ github.repository }}/milestones/$MILESTONE -f state=closed
            echo "Closed milestone v$VERSION"
          else
            echo "No milestone found for v$VERSION"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
